name: tg-token-db-admin
on:
  workflow_dispatch:
jobs:
  fix-token-gate-chat-id:
    runs-on: [self-hosted, hetzner]
    timeout-minutes: 5
    steps:
      - name: Fix token_gate chat_id to Tg_test_toke group
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          KEY_FILE=$(mktemp)
          printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SSH="ssh -i $KEY_FILE -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${SSH_USER}@127.0.0.1"
          $SSH "docker exec tg-token-mongo mongosh tg_token --quiet --eval '
            var correctId = NumberLong(\"-1003986165840\");
            var r = db.token_gates.updateMany({}, { \$set: { chat_id: correctId } });
            print(\"updated: \" + r.modifiedCount);
            db.token_gates.find().forEach(function(d) {
              print(\"chat_id now: \" + d.chat_id);
            });
          '"
          rm -f "$KEY_FILE"
