name: tg-token-db-admin
on:
  workflow_dispatch:
    inputs:
      tg_user_id:
        description: "Telegram user ID to reset"
        required: true
jobs:
  reset:
    runs-on: [self-hosted, hetzner]
    timeout-minutes: 5
    steps:
      - name: Delete user records from Mongo
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          KEY_FILE=$(mktemp)
          printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SSH="ssh -i $KEY_FILE -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${SSH_USER}@127.0.0.1"
          TG_ID="${{ github.event.inputs.tg_user_id }}"
          $SSH "docker exec tg-token-mongo mongosh tg_token --quiet --eval '
            var id = NumberLong(\"$TG_ID\");
            var v = db.verifications.deleteMany({tg_user_id: id});
            var d = db.dust_requests.deleteMany({tg_user_id: id});
            var p = db.pending_joins.deleteMany({tg_user_id: id});
            print(\"verifications deleted: \" + v.deletedCount);
            print(\"dust_requests deleted: \" + d.deletedCount);
            print(\"pending_joins deleted: \" + p.deletedCount);
          '"
          rm -f "$KEY_FILE"
