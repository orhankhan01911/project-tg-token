name: deploy-tg-token

# Manual deploy — clone/pull the repo, build image, start compose, verify bot.
# Notifications → WhatsApp "CI/CD tg token" group via local WA sidecar (:8787).
#
# Required repository secrets:
#   SSH_PRIVATE_KEY     — ed25519 key for root@127.0.0.1
#   SSH_USER            — root
#   TG_TOKEN_BOT_TOKEN  — Telegram bot token
#   TG_TOKEN_OWNER_ID   — Telegram owner user ID
#   TG_TOKEN_ALCHEMY_KEY
#   TG_TOKEN_HELIUS_KEY

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, hetzner]
    timeout-minutes: 15

    steps:
      - name: Clone / update tg-token repo
        run: |
          DEST="$HOME/tg-token"
          if [ -d "$DEST/.git" ]; then
            echo "==> pulling latest"
            git -C "$DEST" pull
          else
            echo "==> fresh clone"
            git clone https://github.com/orhankhan01911/project-tg-token.git "$DEST"
          fi

      - name: Create .env.prod if not present
        run: |
          DEST="$HOME/tg-token"
          if [ ! -f "$DEST/.env.prod" ]; then
            cp "$DEST/.env.prod.template" "$DEST/.env.prod"
            sed -i "s|YOUR_BOT_TOKEN_HERE|${{ secrets.TG_TOKEN_BOT_TOKEN }}|g" "$DEST/.env.prod"
            sed -i "s|YOUR_TELEGRAM_USER_ID|${{ secrets.TG_TOKEN_OWNER_ID }}|g"  "$DEST/.env.prod"
            sed -i "s|YOUR_ALCHEMY_KEY|${{ secrets.TG_TOKEN_ALCHEMY_KEY }}|g"    "$DEST/.env.prod"
            sed -i "s|YOUR_HELIUS_KEY|${{ secrets.TG_TOKEN_HELIUS_KEY }}|g"      "$DEST/.env.prod"
            echo "==> .env.prod created"
          else
            echo "==> .env.prod already exists, skipping"
          fi

      - name: Build image + start stack (via root SSH — runner lacks Docker socket)
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          KEY_FILE=$(mktemp)
          printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SSH="ssh -i $KEY_FILE -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${SSH_USER}@127.0.0.1"

          TG_DIR="$HOME/tg-token"

          echo "==> building Docker image"
          $SSH "cd '$TG_DIR' && docker build -t tg-token-bot:latest ."

          echo "==> starting compose stack"
          $SSH "cd '$TG_DIR/infra' && docker compose -f docker-compose.prod.yml up -d --remove-orphans"

          echo "==> waiting 12s for bot to connect..."
          sleep 12

          echo "==> recent logs"
          $SSH "docker logs --tail=50 tg-token-bot"

          echo ""
          $SSH "docker logs tg-token-bot 2>&1 | grep -q 'bot_starting'" \
            && echo "✅ Bot is alive and polling Telegram" \
            || (echo "❌ bot_starting not found — check logs above" && exit 1)

          rm -f "$KEY_FILE"

      # ── Notifications ────────────────────────────────────────────────────────
      - name: Notify deploy success
        if: success()
        run: |
          MSG="🚀 *tg-token* deployed — bot is live"
          curl -sf -X POST http://127.0.0.1:8787/send \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"CI/CD tg token\",\"body\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" || true

      - name: Notify deploy failure
        if: failure()
        run: |
          MSG="❌ *tg-token* deploy FAILED — check Actions logs
https://github.com/orhankhan01911/project-tg-token/actions"
          curl -sf -X POST http://127.0.0.1:8787/send \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"CI/CD tg token\",\"body\":$(echo "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" || true
