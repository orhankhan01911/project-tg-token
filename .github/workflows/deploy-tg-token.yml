name: deploy-tg-token

# Manual deploy — clone/pull the repo, build image, start compose, verify bot.
# All git + Docker operations run as root via SSH (runner lacks Docker socket and
# previously cloned the repo as root, so /root/tg-token is the canonical path).
# Notifications → WhatsApp "CI/CD tg token" group via local WA sidecar (:8787).
#
# Required repository secrets:
#   SSH_PRIVATE_KEY     — ed25519 key for root@127.0.0.1
#   SSH_USER            — root
#   TG_TOKEN_BOT_TOKEN  — Telegram bot token
#   TG_TOKEN_OWNER_ID   — Telegram owner user ID
#   TG_TOKEN_ALCHEMY_KEY
#   TG_TOKEN_HELIUS_KEY

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'infra/**'
      - 'landing/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, hetzner]
    timeout-minutes: 15

    steps:
      - name: Deploy via root SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          BOT_TOKEN: ${{ secrets.TG_TOKEN_BOT_TOKEN }}
          OWNER_ID: ${{ secrets.TG_TOKEN_OWNER_ID }}
          ALCHEMY_KEY: ${{ secrets.TG_TOKEN_ALCHEMY_KEY }}
          HELIUS_KEY: ${{ secrets.TG_TOKEN_HELIUS_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SSH="ssh -i $KEY_FILE -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${SSH_USER}@127.0.0.1"

          # ── 1. Clone or pull ──────────────────────────────────────────────────
          echo "==> clone / pull"
          $SSH "bash -s" << 'REMOTE'
          set -e
          TG_DIR=/root/tg-token
          if [ -d "$TG_DIR/.git" ]; then
            git -C "$TG_DIR" pull
          else
            git clone https://github.com/orhankhan01911/project-tg-token.git "$TG_DIR"
          fi
          REMOTE

          # ── 2. Write .env.prod (template on remote, secrets from runner env) ──
          # Pipe template through local sed (secrets expand here, never touch SSH args).
          echo "==> writing .env.prod"
          $SSH "cat /root/tg-token/.env.prod.template" \
            | sed \
                -e "s|YOUR_BOT_TOKEN_HERE|${BOT_TOKEN}|g" \
                -e "s|YOUR_TELEGRAM_USER_ID|${OWNER_ID}|g" \
                -e "s|YOUR_ALCHEMY_KEY|${ALCHEMY_KEY}|g" \
                -e "s|YOUR_HELIUS_KEY|${HELIUS_KEY}|g" \
            | $SSH "cat > /root/tg-token/.env.prod"
          echo "==> .env.prod written"

          # ── 3. Build Docker image ─────────────────────────────────────────────
          echo "==> building Docker image"
          $SSH "cd /root/tg-token && docker build -t tg-token-bot:latest ."

          # ── 4. Start / restart stack ──────────────────────────────────────────
          echo "==> starting compose stack"
          $SSH "cd /root/tg-token/infra && docker compose -f docker-compose.prod.yml up -d --remove-orphans"

          # ── 5. Deploy landing page + Caddy site block ─────────────────────────
          # Self-contained: tg-token owns its gatekept.net site block, dropped into
          # /etc/caddy/sites/ and wired into the live systemd Caddy via an `import`
          # in /etc/caddy/Caddyfile. Caddy on this server runs as a systemd service
          # (user `caddy`), config at /etc/caddy/Caddyfile — NOT a btcV2 repo path.
          # This block is idempotent and decoupled from btcV2's deploy.
          echo "==> deploying landing page + caddy site block"
          $SSH "bash -s" << 'REMOTE_CADDY'
          set -e
          mkdir -p /srv/gatekept-landing /etc/caddy/sites
          cp /root/tg-token/landing/index.html /srv/gatekept-landing/index.html
          cp /root/tg-token/infra/Caddyfile.gatekept /etc/caddy/sites/gatekept.conf

          # Ensure the live Caddyfile imports our site block (idempotent).
          CF=/etc/caddy/Caddyfile
          if ! grep -q '/etc/caddy/sites/\*.conf' "$CF"; then
            printf '\n# tg-token / gatekept.net — site blocks in /etc/caddy/sites (project-tg-token).\nimport /etc/caddy/sites/*.conf\n' >> "$CF"
            echo "==> appended import to $CF"
          fi

          # Caddy runs as user `caddy`; a root-owned log file blocks reload. Pre-create
          # the gatekept log owned by caddy so `systemctl reload` never fails on perms.
          mkdir -p /var/log/caddy
          touch /var/log/caddy/gatekept-access.log
          chown caddy:caddy /var/log/caddy/gatekept-access.log

          # Validate before reload so a bad block never takes down the live config.
          caddy validate --config "$CF" >/dev/null
          # systemctl reload runs caddy as the `caddy` user (correct log perms).
          systemctl reload caddy
          REMOTE_CADDY
          echo "==> landing deployed and Caddy reloaded"

          # Verify the landing page actually serves (allow a few tries for TLS cert
          # provisioning on first publish). Loopback to the host's own Caddy via Host header.
          echo "==> verifying gatekept.net serves 200"
          LANDING_OK=0
          for i in $(seq 1 6); do
            CODE=$($SSH "curl -sS -o /dev/null -w '%{http_code}' --max-time 20 https://gatekept.net" 2>/dev/null || echo 000)
            if [ "$CODE" = "200" ]; then LANDING_OK=1; echo "✅ gatekept.net -> 200"; break; fi
            echo "   gatekept.net -> $CODE (retry $i)"; sleep 10
          done
          [ "$LANDING_OK" = "1" ] || echo "⚠️  gatekept.net not 200 yet (cert may still be provisioning)"

          # ── 6. Verify bot alive ───────────────────────────────────────────────
          echo "==> polling for telegram_connected (up to 60s)"
          CONNECTED=0
          for i in $(seq 1 12); do
            if $SSH "docker logs --since 90s tg-token-bot 2>&1 | grep -q 'telegram_connected'"; then
              CONNECTED=1; break
            fi
            STATE=$($SSH "docker inspect -f '{{.State.Status}}' tg-token-bot 2>/dev/null || echo missing")
            if [ "$STATE" != "running" ]; then
              echo "❌ container not running (state=$STATE)"; break
            fi
            sleep 5
          done

          echo "==> recent logs"
          $SSH "docker logs --tail=50 tg-token-bot"

          [ "$CONNECTED" = "1" ] \
            && echo "✅ Bot connected to Telegram" \
            || (echo "❌ telegram_connected not seen in 60s — check logs above" && exit 1)

          rm -f "$KEY_FILE"

      # ── Notifications ─────────────────────────────────────────────────────────
      - name: Notify deploy success
        if: success()
        run: |
          MSG="🚀 *tg-token* deployed — bot is live"
          curl -sf -X POST http://127.0.0.1:8787/send \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"CI/CD tg token\",\"body\":$(printf '%s' "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" || true

      - name: Notify deploy failure
        if: failure()
        run: |
          MSG="$(printf '❌ *tg-token* deploy FAILED — check Actions logs\nhttps://github.com/orhankhan01911/project-tg-token/actions')"
          curl -sf -X POST http://127.0.0.1:8787/send \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"CI/CD tg token\",\"body\":$(printf '%s' "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" || true
